# Runs eval workers only — no Redis, no runner.
# Deploy this on any machine on the LAN to add more eval capacity.
#
# Usage:
#   REDIS_HOST=192.168.1.x docker-compose -f docker-compose.worker.yml up -d
#
# Or set REDIS_HOST in a .env file next to this file.

services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PIPELINE_CONFIG: /app/config.docker.toml
      REDIS_HOST: ${REDIS_HOST}
    volumes:
      - ./config.docker.toml:/app/config.docker.toml:ro
    restart: unless-stopped
