services:
  redis:
    image: redis:7-alpine
    ports:
      - "0.0.0.0:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PIPELINE_CONFIG: /app/config.docker.toml
    volumes:
      - ./config.docker.toml:/app/config.docker.toml:ro
    depends_on:
      - redis
    restart: unless-stopped

  runner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PIPELINE_CONFIG: /app/config.docker.toml
    volumes:
      - ./config.docker.toml:/app/config.docker.toml:ro
      - ${PGN_DIR:-../position_generation/LichessEliteDatabase}:/data/pgns:ro
      - pipeline_db:/data
    depends_on:
      - redis
    profiles: ["tools"]
    # Excluded from `docker-compose up` — run explicitly:
    # docker-compose run --rm runner python extract.py

volumes:
  redis_data:
  pipeline_db:
