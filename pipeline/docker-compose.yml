services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PIPELINE_CONFIG: /app/config.toml
      REDIS_HOST: redis
    volumes:
      - ./config.toml:/app/config.toml:ro
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
