services:
  redis:
    image: redis:7-alpine
    ports:
      - "0.0.0.0:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PIPELINE_CONFIG: /app/config.docker.toml
    volumes:
      - ./config.docker.toml:/app/config.docker.toml:ro
    restart: unless-stopped

volumes:
  redis_data:
