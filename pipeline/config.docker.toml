[redis]
host = "redis"
port = 6379

[worker]
stockfish_path = "/usr/local/bin/stockfish"
concurrency = 14
threads = 1
hash_mb = 256

[extract]
# seed = 42  # uncomment for reproducible sampling
depth = 10
multipv = 5
sample_every_n_min = 2
sample_every_n_max = 10
min_move_number = 5
max_move_number = 50
min_piece_count = 8
game_sample_rate = 0.25
min_games_to_sample = 200
target_per_file = 200
pv_line_moves = 10
# Coarse filter thresholds
max_position_cp = 900
move2_cp = 150
move3_cp = 150
move4_cp = 200
move5_cp = 300
mate_check_top_n = 3

[eval]
depth = 20
multipv = 20

[store]
db_path = "/data/positions.db"

[pgn]
dir = "/data/pgns"
