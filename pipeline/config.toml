[redis]
host = "localhost"
port = 6379

[worker]
# Path to Stockfish binary on this machine
stockfish_path = "/usr/local/bin/stockfish"
# Number of Celery worker processes to spawn
concurrency = 14
# Stockfish threads per worker process (recommend 1)
threads = 1
# Stockfish hash table size per worker in MB
hash_mb = 256

[extract]
# seed = 42  # uncomment for reproducible sampling
depth = 10
multipv = 5
# Sampling params
sample_every_n_min = 2
sample_every_n_max = 10
min_move_number = 5
max_move_number = 50
min_piece_count = 8
game_sample_rate = 0.25
min_games_to_sample = 200
target_per_file = 200
pv_line_moves = 10
# Coarse filter thresholds
max_position_cp = 900
move2_cp = 150
move3_cp = 150
move4_cp = 200
move5_cp = 300
mate_check_top_n = 3

[eval]
depth = 20
multipv = 20

[store]
db_path = "./positions.db"

